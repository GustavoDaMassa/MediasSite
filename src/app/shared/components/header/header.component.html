<mat-toolbar class="header">
  <a routerLink="/overview" class="header__logo">
    <img src="assets/logo.png" alt="MediasAPI" class="header__logo-img" />
    <span class="header__logo-text">MediasAPI</span>
  </a>

  @if (isAuthenticated()) {
    <nav class="header__nav"></nav>
  }

  <span class="header__spacer"></span>

  <button
    mat-icon-button
    (click)="toggleTheme()"
    [matTooltip]="themeTooltipKey() | translate"
  >
    <mat-icon>{{ themeIcon() }}</mat-icon>
  </button>

  <button mat-button class="header__lang-btn" (click)="toggleLang()">
    {{ currentLangLabel() }}
  </button>

  @if (isAuthenticated()) {
    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="header__avatar-btn">
      <span class="header__initials">{{ userInitials() }}</span>
    </button>
    <mat-menu #userMenu="matMenu">
      <div mat-menu-item disabled class="header__user-info">
        {{ currentUser()?.name }}
      </div>
      <mat-divider></mat-divider>
      <a mat-menu-item routerLink="/profile">
        <mat-icon>manage_accounts</mat-icon>
        {{ 'nav.profile' | translate }}
      </a>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        {{ 'auth.logout' | translate }}
      </button>
    </mat-menu>
  }
</mat-toolbar>
