<mat-toolbar class="header">
  @if (isAuthenticated()) {
    <button mat-icon-button class="header__menu-btn" (click)="menuToggle.emit()">
      <img src="assets/logo.png" alt="MediasAPI" class="header__logo-img" />
    </button>
  } @else {
    <div class="header__logo">
      <img src="assets/logo.png" alt="MediasAPI" class="header__logo-img" />
      <span class="header__logo-text">MediasAPI</span>
    </div>
  }
</mat-toolbar>
