<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav mode="over" position="start">
    <app-sidenav (close)="sidenav.close()" />
  </mat-sidenav>
  <mat-sidenav-content>
    <button class="app-menu-btn" [class.app-menu-btn--auth]="isAuthPage()" (click)="sidenav.toggle()" aria-label="Abrir menu">
      <img src="assets/logo.png" alt="" class="app-menu-btn__img" />
      <mat-icon class="app-menu-btn__icon">menu</mat-icon>
    </button>
    <main>
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
